<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080">
    <title>صفحة النخبة | Elite Page</title>
    <style>
        body { 
            margin: 0; 
            background: #000; 
            color: #DAA520; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            overflow-x: hidden; 
        }

        /* الهيدر الملكي */
        .header { 
            background: linear-gradient(145deg, #1a1a1a, #222); 
            padding: 15px 0; 
            border-bottom: 3px solid #DAA520; 
            text-align: center;
            position: relative; /* تغيير لضمان عدم تداخل الطبقات */
            z-index: 1001;
        }

        h1 { margin: 0; font-size: 2em; color: #DAA520; text-shadow: 2px 2px 5px #000; }
        
        .fb-contact {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #DAA520;
            color: #000;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.9em;
            margin-top: 10px;
        }

        /* --- الحل الجذري للشريط الإخباري --- */
        .news-ticker {
            background: #000;
            border-bottom: 2px solid #DAA520;
            height: 50px; /* طول كافي لمنع القص */
            overflow: hidden;
            width: 100%;
            display: flex;
            align-items: center;
            position: relative;
            z-index: 1000;
            direction: ltr; /* إجبار المحرك على التحرك لليسار دائماً */
        }

        .ticker-move {
            display: inline-block;
            white-space: nowrap;
            padding-left: 100%; /* يبدأ من أقصى اليمين بره الشاشة */
            animation: marquee-elite 20s linear infinite;
        }

        .ticker-item {
            display: inline-block;
            color: #DAA520;
            font-weight: bold;
            font-size: 1.3em;
            direction: rtl; /* النص عربي سليم */
            padding-right: 50px;
        }

        /* الأنيميشن المظبوط للحركة لليسار */
        @keyframes marquee-elite {
            0%   { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        /* حاوية العرض */
        #viewport {
            width: 100vw;
            background: #111;
            display: flex;
            justify-content: center;
            padding-top: 10px;
        }

        #canvas-wrapper {
            position: relative;
            width: 1080px; 
            background-color: #000;
        }

        #main-image {
            display: block;
            width: 1080px;
            height: auto;
            min-height: 5000px; /* لضمان ظهور المساحة السوداء قبل تحميل الصورة */
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>صفحة النخبة</h1>
        <a href="https://www.facebook.com/profile.php?id=61587773337715" class="fb-contact" target="_blank">
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" width="18">
            تواصل معنا عبر فيسبوك
        </a>
    </div>

    <div class="news-ticker">
        <div class="ticker-move">
            <div class="ticker-item" id="ticker-content">جاري تحميل أحدث الإعلانات...</div>
        </div>
    </div>

    <div id="viewport">
        <div id="canvas-wrapper">
