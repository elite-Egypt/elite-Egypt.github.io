<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080">
    <title>صفحة النخبة | Elite Page</title>
    <style>
        body { 
            margin: 0; 
            background: #000; 
            color: #DAA520; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            overflow-x: hidden; 
        }

        /* الهيدر الملكي الثابت */
        .header { 
            background: linear-gradient(145deg, #1a1a1a, #222); 
            padding: 15px; 
            border-bottom: 3px solid #DAA520; 
            text-align: center;
            position: sticky; 
            top: 0;
            z-index: 1000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        h1 { margin: 0; font-size: 1.8em; text-shadow: 2px 2px 4px #000; color: #DAA520; }
        
        .fb-contact {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #DAA520;
            color: #000;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.9em;
            margin-top: 10px;
            transition: 0.3s;
        }
        .fb-contact:hover { background: #fff; transform: scale(1.05); }

        /* --- شريط الإعلانات المعدل 100% --- */
        .news-ticker {
            background: #000;
            border-bottom: 2px solid #DAA520;
            height: 45px;
            overflow: hidden;
            position: sticky;
            top: 103px; /* محسوب بدقة أسفل الهيدر */
            z-index: 999;
            display: flex;
            align-items: center;
            /* سر الحركة هنا: تثبيت الاتجاه ltr */
            direction: ltr; 
        }

        .ticker-wrapper {
            display: inline-block;
            white-space: nowrap;
            /* النص يبدأ من أقصى يمين الشاشة */
            padding-left: 100%; 
            animation: marquee 30s linear infinite;
            color: #DAA520;
            font-weight: bold;
            font-size: 1.2em;
            /* نرجع النص عربي */
            direction: rtl; 
        }

        /* حركة دائرية تبدأ من اليمين وتخرج من الشمال وتلف فوراً */
        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        #viewport {
            width: 100vw;
            background: #111;
            display: flex;
            justify-content: center;
            overflow-y: auto;
            padding-top: 20px;
        }

        #canvas-wrapper {
            position: relative;
            width: 1080px; 
            height: 10000px; 
            background-color: #000;
            border-left: 1px solid #333;
            border-right: 1px solid #333;
        }

        #main-image {
            display: block;
            width: 1080px;
            height: 10000px;
            image-rendering: -webkit-optimize-contrast; 
        }

        html { scroll-behavior: smooth; }
    </style>
</head>
<body>

    <div class="header">
        <h1>صفحة النخبة</h1>
        <a href="https://www.facebook.com/profile.php?id=61587773337715" class="fb-contact" target="_blank">
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" width="18">
            تواصل معنا عبر فيسبوك
        </a>
    </div>

    <div class="news-ticker">
        <div class="ticker-wrapper" id="ticker-content">
            جاري تحميل أحدث الإعلانات...
        </div>
    </div>

    <div id="viewport">
        <div id="canvas-wrapper">
            <img id="main-image" usemap="#pixelmap">
            <map name="pixelmap" id="map-links"></map>
        </div>
    </div>

    <script>
      window.onload = function() {
          const timestamp = Date.now();
          
          // تحديث الصورة
          const img = document.getElementById('main-image');
          img.src = 'all.webp?v=' + timestamp;

          // تحديث الروابط
          const scriptLinks = document.createElement('script');
          scriptLinks.src = 'links.js?v=' + timestamp; 
          document.head.appendChild(scriptLinks);

          // تحديث الإعلانات
          const scriptAds = document.createElement('script');
          scriptAds.src = 'ads.js?v=' + timestamp;
          document.head.appendChild(scriptAds);
      };
    </script>

</body>
</html>
