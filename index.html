<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080">
    <title>صفحة النخبة | Elite Page</title>
    <style>
        body { 
            margin: 0; 
            background: #000; 
            color: #DAA520; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            overflow-x: hidden; 
        }

        /* الهيدر الملكي */
        .header { 
            background: linear-gradient(145deg, #1a1a1a, #222); 
            padding: 10px 0; 
            border-bottom: 3px solid #DAA520; 
            text-align: center;
            position: sticky; 
            top: 0;
            z-index: 1001;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        h1 { margin: 0; font-size: 1.6em; color: #DAA520; }
        
        .fb-contact {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #DAA520;
            color: #000;
            text-decoration: none;
            padding: 5px 15px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.8em;
            margin-top: 5px;
        }

        /* --- حل مشكلة الشريط المقصوص والاتجاه --- */
        .news-ticker {
            background: #000;
            border-bottom: 2px solid #DAA520;
            height: 40px; /* طول مناسب جداً */
            overflow: hidden;
            position: sticky;
            top: 90px; /* ظبطنا مكانه بالضبط تحت الهيدر */
            z-index: 1000;
            width: 100%;
            display: flex;
            align-items: center;
            direction: ltr; /* إجبار الحركة تبدأ يمين وتنتهي شمال */
        }

        .ticker-move {
            display: inline-block;
            white-space: nowrap;
            padding-left: 100%; 
            animation: marquee-elite 20s linear infinite;
        }

        .ticker-item {
            display: inline-block;
            color: #DAA520;
            font-weight: bold;
            font-size: 1.1em;
            direction: rtl; /* النص عربي سليم */
            padding-right: 30px;
        }

        /* اتجاه الحركة من اليمين للشمال */
        @keyframes marquee-elite {
            0%   { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        /* حاوية العرض */
        #viewport {
            width: 100vw;
            background: #111;
            display: flex;
            justify-content: center;
            padding-top: 5px; 
        }

        #canvas-wrapper {
            position: relative;
            width: 1080px; 
            height: 10000px; 
            background-color: #000;
        }

        #main-image {
            display: block;
            width: 1080px;
            height: 10000px;
            image-rendering: auto; 
        }
    </style>
</head>
<body>

    <div class="header" id="main-header">
        <h1>صفحة النخبة</h1>
        <a href="https://www.facebook.com/profile.php?id=61587773337715" class="fb-contact" target="_blank">
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" width="16">
            تواصل معنا عبر فيسبوك
        </a>
    </div>

    <div class="news-ticker">
        <div class="ticker-move">
            <div class="ticker-item" id="ticker-content">جاري التحميل...</div>
        </div>
    </div>

    <div id="viewport">
        <div id="canvas-wrapper">
            <img id="main-image" usemap="#pixelmap">
            <map name="pixelmap" id="map-links"></map>
        </div>
    </div>

    <script>
      // دالة لتوليد رقم عشوائي لمنع المتصفح من حفظ الـ Cache القديم
      const cacheBuster = Date.now();

      // 1. تحديث الصورة أوتوماتيكياً
      window.onload = function() {
          const img = document.getElementById('main-image');
          img.src = 'all.webp?v=' + cacheBuster;
          
          // ظبط مكان التيكر ديناميكياً بناءً على حجم الهيدر الحقيقي
          const headerHeight = document.getElementById('main-header').offsetHeight;
          document.querySelector('.news-ticker').style.top = headerHeight + 'px';
      };

      // 2. تحميل الملفات (روابط وإعلانات) بنسخة جديدة دائماً
      function refreshData(src) {
          const script = document.createElement('script');
          script.src = src + '?v=' + cacheBuster;
          document.head.appendChild(script);
      }

      refreshData('links.js');
      refreshData('ads.js');

      // إجبار الصفحة على التحديث لو قعدت مفتوحة فترة طويلة (اختياري)
      // setInterval(() => { location.reload(); }, 300000); // كل 5 دقائق
    </script>

</body>
</html>
