<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080">
    <title>صفحة النخبة | Elite Page</title>
    <style>
        /* الأساسيات */
        body { 
            margin: 0; 
            padding: 0;
            background: #000; 
            color: #DAA520; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            overflow-x: hidden; 
        }

        /* الهيدر الملكي */
        header { 
            background: linear-gradient(145deg, #1a1a1a, #222); 
            padding: 20px 0; 
            border-bottom: 3px solid #DAA520; 
            text-align: center;
            width: 100%;
        }

        h1 { margin: 0; font-size: 2.2em; color: #DAA520; text-shadow: 2px 2px 5px #000; }
        
        .fb-contact {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #DAA520;
            color: #000;
            text-decoration: none;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1em;
            margin-top: 10px;
            transition: 0.3s;
        }

        /* --- حل مشكلة الشريط الإخباري (مجرب 100%) --- */
        .ticker-container {
            background: #000;
            border-bottom: 2px solid #DAA520;
            width: 100%;
            height: 55px; /* ارتفاع كافي جداً */
            overflow: hidden;
            display: flex;
            align-items: center;
            direction: ltr; /* إجبار الحركة لليسار */
            position: relative;
        }

        .ticker-text {
            display: inline-block;
            white-space: nowrap;
            padding-left: 100%; /* يبدأ من أقصى اليمين */
            animation: marquee 25s linear infinite;
        }

        .ticker-content {
            display: inline-block;
            color: #DAA520;
            font-weight: bold;
            font-size: 1.4em;
            direction: rtl; /* النص عربي سليم */
            padding-right: 50px;
        }

        @keyframes marquee {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }

        /* حاوية العرض */
        #viewport {
            width: 100%;
            background: #111;
            display: flex;
            justify-content: center;
            padding-top: 20px;
        }

        #canvas-wrapper {
            position: relative;
            width: 1080px; 
            background-color: #000;
        }

        #main-image {
            display: block;
            width: 1080px;
            height: auto;
        }
    </style>
</head>
<body>

    <header>
        <h1>صفحة النخبة</h1>
        <a href="https://www.facebook.com/profile.php?id=61587773337715" class="fb-contact" target="_blank">
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" width="20">
            تواصل معنا عبر فيسبوك
        </a>
    </header>

    <div class="ticker-container">
        <div class="ticker-text">
            <div class="ticker-content" id="ticker-content">جاري تحميل أحدث الإعلانات والفرص...</div>
        </div>
    </div>

    <div id="viewport">
        <div id="canvas-wrapper">
            <img id="main-image" usemap="#pixelmap">
            <map name="pixelmap" id="map-links"></map>
        </div>
    </div>

    <script>
        // دالة التحديث ومنع الكاش (Cache Buster)
        const ts = new Date().getTime();

        window.onload = function() {
            // تحديث الصورة
            const img = document.getElementById('main-image');
            img.src = 'all.webp?v=' + ts;

            // تحميل الروابط والإعلانات بنسخ فريش
            injectScript('links.js?v=' + ts);
            injectScript('ads.js?v=' + ts);
        };

        function injectScript(src) {
            const s = document.createElement('script');
            s.src = src;
            s.async = true;
            document.head.appendChild(s);
        }
    </script>

</body>
</html>
