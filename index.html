<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080">
    <title>صفحة النخبة | Elite Page</title>
    <style>
        body { 
            margin: 0; 
            background: #000; 
            color: #DAA520; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            overflow-x: hidden; 
        }

        /* الهيدر الملكي الثابت */
        .header { 
            background: linear-gradient(145deg, #1a1a1a, #222); 
            padding: 15px; 
            border-bottom: 3px solid #DAA520; 
            text-align: center;
            position: sticky; 
            top: 0;
            z-index: 1000;
        }

        h1 { margin: 0; font-size: 1.8em; text-shadow: 2px 2px 4px #000; color: #DAA520; }
        
        .fb-contact {
            display: inline-flex;
            align-items: center; gap: 10px;
            background: #DAA520; color: #000;
            text-decoration: none; padding: 8px 20px;
            border-radius: 50px; font-weight: bold;
            font-size: 0.9em; margin-top: 10px;
        }

        /* الشريط الإخباري - الحل الذي لا يتأثر باللغة */
        .news-ticker {
            background: #000;
            border-bottom: 2px solid #DAA520;
            height: 45px;
            overflow: hidden;
            position: sticky;
            top: 103px; 
            z-index: 999;
            width: 100%;
            direction: ltr !important; /* تثبيت الاتجاه برمجياً لمنع عك المتصفح */
        }

        .ticker-wrapper {
            position: absolute;
            white-space: nowrap;
            display: inline-block;
            line-height: 45px;
            color: #DAA520;
            font-weight: bold;
            font-size: 1.2em;
            /* الإعلان يبدأ من أقصى اليمين (100%) ويخرج من أقصى اليسار (-100%) */
            animation: elite-marquee 30s linear infinite;
            direction: rtl !important; /* النص يفضل عربي */
        }

        @keyframes elite-marquee {
            0% { left: 100%; }
            100% { left: -100%; } /* تم تغيير translateX لـ left لضمان الثبات */
        }

        #viewport {
            width: 100vw;
            background: #111;
            display: flex;
            justify-content: center;
            overflow-y: auto;
            padding-top: 20px;
        }

        #canvas-wrapper {
            position: relative;
            width: 1080px; 
            height: 10000px; 
            background-color: #000;
            border-left: 1px solid #333;
            border-right: 1px solid #333;
        }

        #main-image {
            display: block;
            width: 1080px;
            height: 10000px;
            image-rendering: -webkit-optimize-contrast; 
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>صفحة النخبة</h1>
        <a href="https://www.facebook.com/profile.php?id=61587773337715" class="fb-contact" target="_blank">
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" width="18">
            تواصل معنا عبر فيسبوك
        </a>
    </div>

    <div class="news-ticker">
        <div class="ticker-wrapper" id="ticker-content">جاري تحميل أحدث الإعلانات...</div>
    </div>

    <div id="viewport">
        <div id="canvas-wrapper">
            <img id="main-image" usemap="#pixelmap">
            <map name="pixelmap" id="map-links"></map>
        </div>
    </div>

    <script>
      window.onload = function() {
          const v = Date.now();
          // تحديث الصورة
          document.getElementById('main-image').src = 'all.webp?v=' + v;
          
          // تحديث الروابط
          const sL = document.createElement('script');
          sL.src = 'links.js?v=' + v;
          document.head.appendChild(sL);

          // تحديث الإعلانات
          const sA = document.createElement('script');
          sA.src = 'ads.js?v=' + v;
          document.head.appendChild(sA);
      };
    </script>
</body>
</html>
