<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080">
    <title>صفحة النخبة | Elite Page</title>
    <style>
        body { 
            margin: 0; 
            background: #000; 
            color: #DAA520; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            overflow-x: hidden; 
        }

        .header { 
            background: linear-gradient(145deg, #1a1a1a, #222); 
            padding: 15px; 
            border-bottom: 3px solid #DAA520; 
            text-align: center;
            position: sticky; 
            top: 0;
            z-index: 1000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        h1 { margin: 0; font-size: 1.8em; text-shadow: 2px 2px 4px #000; color: #DAA520; }
        
        .fb-contact {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #DAA520;
            color: #000;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.9em;
            margin-top: 10px;
            transition: 0.3s;
        }
        .fb-contact:hover { background: #fff; transform: scale(1.05); }

        /* --- تطوير الشريط الإخباري ليكون دائرياً بدون توقف --- */
        .news-ticker {
            background: #000;
            border-bottom: 2px solid #DAA520;
            height: 50px;
            overflow: hidden;
            position: sticky;
            top: 103px; 
            z-index: 999;
            display: flex;
            align-items: center;
            direction: ltr; /* التغليف يسار لضمان حركة الـ Loop */
        }

        .ticker-wrapper {
            display: flex;
            white-space: nowrap;
            padding-right: 50px; /* مسافة أمان قبل تكرار الدورة */
            animation: marquee-infinite 30s linear infinite; /* سرعة انسيابية */
        }

        .ticker-wrapper:hover {
            animation-play-state: paused; /* يقف عند وضع الماوس عليه لسهولة القراءة */
        }

        /* تنسيق الإعلانات داخل الشريط */
        #ticker-content {
            display: flex;
            flex-shrink: 0;
            gap: 50px; /* مسافة بين كل إعلان والتاني */
            color: #DAA520;
            font-weight: bold;
            font-size: 1.2em;
            direction: rtl; /* النصوص من اليمين لليسار */
        }

        @keyframes marquee-infinite {
            0% { transform: translateX(0); }
            100% { transform: translateX(100%); }
        }

        /* حاوية العرض */
        #viewport {
            width: 100vw;
            background: #111;
            display: flex;
            justify-content: center;
            overflow-y: auto;
            padding-top: 20px; 
        }

        #canvas-wrapper {
            position: relative;
            width: 1080px; 
            height: 10000px; 
            background-color: #000;
            border-left: 1px solid #333;
            border-right: 1px solid #333;
        }

        #main-image {
            display: block;
            width: 1080px;
            height: 10000px;
            image-rendering: -webkit-optimize-contrast; 
            background-image: 
                linear-gradient(to right, #1a1a1a 1px, transparent 1px),
                linear-gradient(to bottom, #1a1a1a 1px, transparent 1px);
            background-size: 108px 108px;
        }

        html {
            scroll-behavior: smooth;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>صفحة النخبة</h1>
        <a href="https://www.facebook.com/profile.php?id=61587773337715" class="fb-contact" target="_blank">
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" width="18">
            تواصل معنا عبر فيسبوك
        </a>
    </div>

    <div class="news-ticker">
        <div class="ticker-wrapper">
            <div id="ticker-content">
                جاري تحميل أحدث الإعلانات والفرص الحصرية... • ترقبوا عروض النخبة القادمة • انضموا إلينا الآن عبر فيسبوك
            </div>
        </div>
    </div>

    <div id="viewport">
        <div id="canvas-wrapper">
            <img id="main-image" usemap="#pixelmap">
            <map name="pixelmap" id="map-links"></map>
        </div>
    </div>

    <script>
      // تحديث الصورة أوتوماتيكياً لضمان عدم وجود Cache
      window.onload = function() {
          var img = document.getElementById('main-image');
          img.src = 'all.webp?v=' + Date.now();
      };

      // تحميل الملفات الخارجية
      function loadScript(src) {
          var script = document.createElement('script');
          script.src = src + '?v=' + Date.now();
          document.head.appendChild(script);
      }

      loadScript('links.js');
      loadScript('ads.js');

      // ميزة ذكية: لو الإعلانات في ads.js كتير، الكود هيضاعف النص عشان يملأ الفراغ
      setTimeout(() => {
          const content = document.getElementById('ticker-content');
          if (content.innerText.length < 200) {
              content.innerHTML += ' • ' + content.innerHTML; 
          }
      }, 1000);
    </script>

</body>
</html>
