<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080">
    <title>صفحة النخبة | Elite Page</title>
    <style>
        body { margin: 0; padding: 0; background: #000; color: #DAA520; font-family: 'Segoe UI', Tahoma, sans-serif; overflow-x: hidden; }

        .header { 
            background: linear-gradient(145deg, #1a1a1a, #222); 
            padding: 15px 0; border-bottom: 3px solid #DAA520; text-align: center;
            position: sticky; top: 0; z-index: 1000;
        }

        h1 { margin: 0; font-size: 1.8em; color: #DAA520; }
        
        .fb-contact {
            display: inline-flex; align-items: center; gap: 10px; background: #DAA520;
            color: #000; text-decoration: none; padding: 8px 20px; border-radius: 50px;
            font-weight: bold; font-size: 0.9em; margin-top: 10px;
        }

        /* --- حل مشكلة القص النهائي --- */
        .news-ticker {
            background: #000;
            border-bottom: 2px solid #DAA520;
            height: 60px; /* زودنا الارتفاع هنا عشان الكلام يظهر كامل وميتقصش */
            overflow: hidden;
            position: sticky;
            top: 103px; /* تأكد إن الرقم ده متوافق مع طول الهيدر */
            z-index: 999;
            width: 100%;
            display: flex;
            align-items: center; /* بيخلي النص في نص المستطيل بالظبط */
        }

        .ticker-move {
            display: inline-block;
            white-space: nowrap;
            padding-right: 100%;
            animation: marquee 20s linear infinite; 
        }

        .ticker-item {
            display: inline-block;
            color: #DAA520;
            font-weight: bold;
            font-size: 1.3em;
            padding-left: 50px;
            line-height: 60px; /* لضمان إن الحروف الطويلة متتقصش */
        }

        @keyframes marquee {
            0%   { transform: translateX(0); }
            100% { transform: translateX(100%); }
        }

        #viewport { width: 100vw; background: #111; display: flex; justify-content: center; padding-top: 20px; }
        #canvas-wrapper { position: relative; width: 1080px; height: 10000px; background-color: #000; border: 1px solid #333; }
        #main-image { display: block; width: 1080px; height: 10000px; }
    </style>
</head>
<body>

    <div class="header" id="myHeader">
        <h1>صفحة النخبة</h1>
        <a href="https://www.facebook.com/profile.php?id=61587773337715" class="fb-contact" target="_blank">
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" width="18">
            تواصل معنا عبر فيسبوك
        </a>
    </div>

    <div class="news-ticker">
        <div class="ticker-move">
            <div class="ticker-item" id="ticker-content">جاري جلب أحدث الإعلانات...</div>
        </div>
    </div>

    <div id="viewport">
        <div id="canvas-wrapper">
            <img id="main-image" usemap="#pixelmap">
            <map name="pixelmap" id="map-links"></map>
        </div>
    </div>

    <script>
      // دالة التحديث الإجباري (Force Refresh) لكل حاجة
      const v = new Date().getTime(); // رقم فريد يتغير كل مللي ثانية

      window.onload = function() {
          // تحديث الصورة
          const img = document.getElementById('main-image');
          img.src = 'all.webp?v=' + v;

          // ظبط مكان المستطيل أوتوماتيك عشان ميتقصش مهما كان حجم الهيدر
          const header = document.getElementById('myHeader');
          const ticker = document.querySelector('.news-ticker');
          ticker.style.top = header.offsetHeight + 'px';
      };

      // تحميل الروابط والإعلانات "طازة" غصب عن المتصفح
      function forceLoad(src) {
          const s = document.createElement('script');
          s.src = src + '?v=' + v;
          document.head.appendChild(s);
      }
      
      forceLoad('links.js');
      forceLoad('ads.js');
    </script>

</body>
</html>
