<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080">
    <title>صفحة النخبة | Elite Page</title>
    <style>
        /* الأساسيات */
        body { 
            margin: 0; 
            background: #000; 
            color: #DAA520; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            overflow-x: hidden; 
        }

        /* الهيدر */
        .header { 
            background: linear-gradient(145deg, #1a1a1a, #222); 
            padding: 15px; 
            border-bottom: 3px solid #DAA520; 
            text-align: center;
            position: sticky; 
            top: 0;
            z-index: 1000;
        }

        h1 { margin: 0; font-size: 1.8em; color: #DAA520; }
        
        .fb-contact {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #DAA520;
            color: #000;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.9em;
            margin-top: 10px;
        }

        /* --- الشريط الإخباري العالمي (حل نهائي) --- */
        .news-ticker {
            background: #000;
            border-bottom: 2px solid #DAA520;
            height: 45px;
            overflow: hidden;
            position: sticky;
            top: 103px; 
            z-index: 999;
            width: 100%;
            display: flex;
        }

        .ticker-wrap {
            display: flex;
            width: 100%;
            overflow: hidden;
        }

        .ticker-move {
            display: flex;
            white-space: nowrap;
            animation: marquee-final 30s linear infinite; /* السرعة هنا */
        }

        .ticker-item {
            flex-shrink: 0;
            padding-left: 100px; /* المسافة بين تكرار النص */
            display: flex;
            align-items: center;
            color: #DAA520;
            font-weight: bold;
            font-size: 1.2em;
        }

        /* الحركة دي بتخلي النص يلف ويرجع مكانه في كسر من الثانية */
        @keyframes marquee-final {
            0% { transform: translateX(0); }
            100% { transform: translateX(50%); } 
        }

        /* إيقاف الحركة عند الماوس للقراءة */
        .ticker-move:hover { animation-play-state: paused; }

        /* حاوية الصور */
        #viewport {
            width: 100vw;
            background: #111;
            display: flex;
            justify-content: center;
            padding-top: 20px; 
        }

        #canvas-wrapper {
            position: relative;
            width: 1080px; 
            height: 10000px; 
            background-color: #000;
            border: 1px solid #333;
        }

        #main-image {
            display: block;
            width: 1080px;
            height: 10000px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>صفحة النخبة</h1>
        <a href="https://www.facebook.com/profile.php?id=61587773337715" class="fb-contact" target="_blank">
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" width="18">
            تواصل معنا عبر فيسبوك
        </a>
    </div>

    <div class="news-ticker">
        <div class="ticker-wrap">
            <div class="ticker-move" id="ticker-move">
                <div class="ticker-item" id="content1">جاري تحميل أحدث الإعلانات... • ترقبوا عروض النخبة •</div>
                <div class="ticker-item" id="content2">جاري تحميل أحدث الإعلانات... • ترقبوا عروض النخبة •</div>
            </div>
        </div>
    </div>

    <div id="viewport">
        <div id="canvas-wrapper">
            <img id="main-image" usemap="#pixelmap">
            <map name="pixelmap" id="map-links"></map>
        </div>
    </div>

    <script>
      // 1. تحديث الصورة فوراً
      window.onload = function() {
          var img = document.getElementById('main-image');
          img.src = 'all.webp?v=' + Date.now();
      };

      // 2. سحب الروابط والإعلانات
      function loadExternal() {
          var s1 = document.createElement('script');
          s1.src = 'links.js?v=' + Date.now();
          document.head.appendChild(s1);

          var s2 = document.createElement('script');
          s2.src = 'ads.js?v=' + Date.now();
          s2.onload = function() {
              // حركة ذكية: بنحدث النسخة المكررة عشان الـ Loop يكمل
              setTimeout(() => {
                  const txt = document.getElementById('content1').innerHTML;
                  document.getElementById('content2').innerHTML = txt;
              }, 600);
          };
          document.head.appendChild(s2);
      }
      
      loadExternal();
    </script>

</body>
</html>
