<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحة النخبة | Elite Page</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #FFF; margin: 0; padding: 0; text-align: center; overflow-x: hidden; }
        .header { background: linear-gradient(145deg, #1a1a1a, #263d3d); padding: 30px; border-bottom: 4px solid #DAA520; }
        h1 { font-size: 3em; color: #DAA520; margin: 0 0 15px 0; font-weight: bold; }
        .contact a { color: #000; text-decoration: none; background: #DAA520; padding: 12px 30px; border-radius: 50px; font-weight: bold; display: inline-flex; align-items: center; gap: 10px; transition: 0.3s; }
        .contact a:hover { transform: scale(1.05); background: #fff; }
        #canvasContainer { width: 100vw; height: 75vh; overflow: auto; background: #000; border-top: 1px solid #333; }
        canvas { display: block; background: #1a1a1a; cursor: crosshair; }
        .modal { display: none; position: fixed; z-index: 2000; left: 50%; top: 50%; transform: translate(-50%, -50%); background: #1a1a1a; border: 2px solid #DAA520; padding: 30px; border-radius: 20px; box-shadow: 0 0 40px #000; min-width: 280px; }
        .modal h2 { color: #DAA520; }
        .modal button { background: #DAA520; border: none; padding: 10px 25px; cursor: pointer; font-weight: bold; border-radius: 5px; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>صفحة النخبة</h1>
        <div class="contact">
            <a href="https://www.facebook.com/profile.php?id=61587773337715" target="_blank">
                <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" width="22">
                تواصل معنا واحجز مكانك في النخبة
            </a>
        </div>
    </div>

    <div id="canvasContainer">
        <canvas id="pixelCanvas"></canvas>
    </div>

    <div id="infoModal" class="modal">
        <h2 id="pixelNumber"></h2>
        <p>تواصل معنا عبر الفيسبوك واحجز مكانك الآن.</p>
        <button onclick="document.getElementById('infoModal').style.display='none'">إغلاق</button>
    </div>

    <script>
        const canvas = document.getElementById('pixelCanvas');
        const ctx = canvas.getContext('2d');
        const pixelSize = 10, cols = 1000, rows = 1000;
        canvas.width = cols * pixelSize; canvas.height = rows * pixelSize;

        // رسم أرضية سوداء
        ctx.fillStyle = "#1a1a1a"; ctx.fillRect(0, 0, canvas.width, canvas.height);

        // الرادار الشامل: بيجرب يفتح الصورة بكل الصيغ (png, jpg, jpeg) أوتوماتيكياً
        const extensions = ['png', 'jpg', 'jpeg'];
        
        for (let i = 1; i <= 100; i++) {
            extensions.forEach(ext => {
                const img = new Image();
                img.src = `${i}.${ext}`; // بيجرب يفتح 1.png ثم 1.jpg وهكذا
                img.onload = () => {
                    const n = i - 1;
                    ctx.drawImage(img, (n % cols) * pixelSize, Math.floor(n / cols) * pixelSize, pixelSize, pixelSize);
                };
            });
        }

        // تفاعل الضغط
        canvas.addEventListener('click', function(e) {
            const rect = canvas.getBoundingClientRect();
            const x = Math.floor((e.clientX - rect.left) / (rect.width / cols));
            const y = Math.floor((e.clientY - rect.top) / (rect.height / rows));
            document.getElementById('pixelNumber').innerText = "مربع رقم: " + ((y * cols) + x + 1);
            document.getElementById('infoModal').style.display = 'block';
        });
    </script>
</body>
</html>
