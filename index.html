<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080">
    <title>صفحة النخبة | Elite Page</title>
    <style>
        body { 
            margin: 0; 
            background: #000; 
            color: #DAA520; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            overflow-x: hidden; 
        }

        /* الهيدر الملكي الثابت */
        .header { 
            background: linear-gradient(145deg, #1a1a1a, #222); 
            padding: 10px 0; 
            border-bottom: 3px solid #DAA520; 
            text-align: center;
            position: sticky; 
            top: 0;
            z-index: 1001;
            height: auto;
        }

        h1 { margin: 5px 0; font-size: 1.8em; color: #DAA520; }
        
        .fb-contact {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #DAA520;
            color: #000;
            text-decoration: none;
            padding: 5px 15px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        /* شريط الإعلانات - تصليح المسار */
        .news-ticker {
            background: #000;
            border-bottom: 2px solid #DAA520;
            height: 40px;
            overflow: hidden;
            position: sticky;
            top: 90px; /* مكان ثابت أسفل الهيدر */
            z-index: 1000;
            width: 100%;
        }

        .ticker-wrapper {
            display: inline-block;
            white-space: nowrap;
            padding-right: 100%; /* الفراغ يبدأ من اليمين */
            animation: marquee 20s linear infinite;
            color: #DAA520;
            font-weight: bold;
            font-size: 1.2em;
            line-height: 40px;
        }

        /* حركة دائرية صحيحة 100% */
        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        #viewport {
            width: 100vw;
            background: #111;
            display: flex;
            justify-content: center;
            padding-top: 5px;
        }

        #canvas-wrapper {
            position: relative;
            width: 1080px; 
            height: 10000px; 
            background-color: #000;
        }

        #main-image {
            display: block;
            width: 1080px;
            height: 10000px;
            image-rendering: -webkit-optimize-contrast; 
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>صفحة النخبة</h1>
        <a href="https://www.facebook.com/profile.php?id=61587773337715" class="fb-contact" target="_blank">
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" width="18">
            تواصل معنا عبر فيسبوك
        </a>
    </div>

    <div class="news-ticker">
        <div class="ticker-wrapper" id="ticker-content">جاري تحميل الإعلانات...</div>
    </div>

    <div id="viewport">
        <div id="canvas-wrapper">
            <img id="main-image" usemap="#pixelmap">
            <map name="pixelmap" id="map-links"></map>
        </div>
    </div>

    <script>
      window.onload = function() {
          const v = Date.now();
          const img = document.getElementById('main-image');
          img.src = 'all.webp?v=' + v;

          const scriptLinks = document.createElement('script');
          scriptLinks.src = 'links.js?v=' + v;
          document.head.appendChild(scriptLinks);

          const scriptAds = document.createElement('script');
          scriptAds.src = 'ads.js?v=' + v;
          document.head.appendChild(scriptAds);
      };
    </script>

</body>
</html>
