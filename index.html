<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحة النخبة | Elite Page</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #121212; 
            color: #FFF; 
            margin: 0; 
            padding: 0; 
        }
        
        .header { 
            background: linear-gradient(145deg, #1a1a1a, #263d3d); 
            padding: 40px 10px; 
            border-bottom: 4px solid #DAA520; 
            text-align: center; /* بيخلي كل حاجة في النص */
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        
        h1 { 
            font-size: clamp(2em, 8vw, 3.5em); /* حجم مرن للموبايل والكمبيوتر */
            color: #DAA520; 
            margin: 0 0 20px 0; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        
        .contact a { 
            color: #000; 
            text-decoration: none; 
            background: #DAA520; 
            padding: 12px 25px; 
            border-radius: 50px; 
            font-weight: bold; 
            display: inline-flex; 
            align-items: center; 
            gap: 10px;
            transition: 0.3s;
            font-size: 1.1em;
        }
        .contact a:hover { transform: scale(1.05); background: #fff; }
        
        /* شعار الفيسبوك */
        .fb-icon { width: 24px; height: 24px; }

        #canvasContainer {
            width: 100vw;
            height: 70vh;
            overflow: auto;
            background: #000;
            border-top: 1px solid #333;
        }

        canvas { display: block; background: #1a1a1a; cursor: crosshair; }

        /* النافذة المنبثقة */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 50%; top: 50%;
            transform: translate(-50%, -50%);
            background: #1a1a1a;
            border: 2px solid #DAA520;
            padding: 30px;
            text-align: center;
            border-radius: 15px;
            min-width: 280px;
        }
        .modal h2 { color: #DAA520; margin-bottom: 15px; }
        .modal button { 
            background: #DAA520; border: none; padding: 10px 25px; 
            color: #000; font-weight: bold; cursor: pointer; border-radius: 5px; 
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>صفحة النخبة</h1>
        <div class="contact">
            <a href="https://www.facebook.com/profile.php?id=61587773337715" target="_blank">
                <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" class="fb-icon" alt="FB">
                تواصل معنا واحجز مكانك في النخبة
            </a>
        </div>
    </div>

    <div id="canvasContainer">
        <canvas id="pixelCanvas"></canvas>
    </div>

    <div id="infoModal" class="modal">
        <h2 id="pixelNumber"></h2>
        <p>تواصل معنا الآن عبر الفيسبوك لحجز مكانك في النخبة.</p>
        <button onclick="closeModal()">إغلاق</button>
    </div>

    <script>
        const canvas = document.getElementById('pixelCanvas');
        const ctx = canvas.getContext('2d');
        const pixelSize = 10;
        const cols = 1000;
        const rows = 1000;
        canvas.width = cols * pixelSize;
        canvas.height = rows * pixelSize;

        // رسم الخلفية والشبكة
        function initCanvas() {
            ctx.fillStyle = "#1a1a1a";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "#252525";
            ctx.lineWidth = 0.5;
            for(let i=0; i<=canvas.width; i+=50) { // خطوط شبكة خفيفة كل 5 مربعات
                ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke();
            }
        }

        // مصفوفة الصور (هنا هتضيف صورك)
        const imagesToLoad = [
            // { id: "1", src: "logos/1.png" }, // مثال
        ];

        function loadLogos() {
            imagesToLoad.forEach(item => {
                const img = new Image();
                img.src = item.src;
                img.onload = () => {
                    item.id.split(" ").forEach(id => {
                        const n = parseInt(id) - 1;
                        ctx.drawImage(img, (n%cols)*pixelSize, Math.floor(n/cols)*pixelSize, pixelSize, pixelSize);
                    });
                };
            });
        }

        canvas.addEventListener('click', function(e) {
            const rect = canvas.getBoundingClientRect();
            const x = Math.floor((e.clientX - rect.left) / (rect.width / cols));
            const y = Math.floor((e.clientY - rect.top) / (rect.height / rows));
            document.getElementById('pixelNumber').innerText = "مربع رقم: " + ((y * cols) + x + 1);
            document.getElementById('infoModal').style.display = 'block';
        });

        function closeModal() { document.getElementById('infoModal').style.display = 'none'; }

        initCanvas();
        loadLogos();
    </script>
</body>
</html>
