<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>صفحة النخبة | Elite Page</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #FFF; margin: 0; padding: 0; overflow: hidden; }
        .header { background: #1a1a1a; padding: 15px; border-bottom: 3px solid #DAA520; text-align: center; position: relative; z-index: 100; }
        h1 { color: #DAA520; margin: 0; font-size: 1.5em; }
        #viewport { width: 100vw; height: calc(100vh - 80px); overflow: auto; background: #111; -webkit-overflow-scrolling: touch; }
        #canvas-wrapper { position: relative; width: 2000px; height: 2000px; }
        canvas { display: block; image-rendering: pixelated; background-color: #1a1a1a; }
        .modal { display: none; position: fixed; z-index: 2000; left: 50%; top: 50%; transform: translate(-50%, -50%); background: #1a1a1a; border: 2px solid #DAA520; padding: 20px; border-radius: 10px; text-align: center; }
    </style>
</head>
<body>

    <div class="header">
        <h1>صفحة النخبة</h1>
        <a href="https://www.facebook.com/profile.php?id=61587773337715" style="color:#DAA520; text-decoration:none; font-size:14px; font-weight:bold;">احجز مكانك الآن</a>
    </div>

    <div id="viewport">
        <div id="canvas-wrapper">
            <canvas id="mainCanvas"></canvas>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const pixelSize = 20; 
        const gridSize = 100; 
        
        canvas.width = gridSize * pixelSize;
        canvas.height = gridSize * pixelSize;

        // رسم الشبكة فوراً
        function drawGrid() {
            ctx.fillStyle = "#1a1a1a";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "#333";
            ctx.lineWidth = 0.5;
            for(let i=0; i<=canvas.width; i+=pixelSize) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); }
            for(let i=0; i<=canvas.height; i+=pixelSize) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke(); }
        }

        // تحميل صورة ترامب (رقم 1) بشكل مباشر وصريح
        function loadImages() {
            const img = new Image();
            // السطر ده هو الأهم: بينادي على الصورة باسمها اللي موجود في الـ GitHub
            img.src = "1.png"; 
            
            img.onload = () => {
                ctx.imageSmoothingEnabled = false;
                // رسم الصورة في المربع الأول (0,0)
                ctx.drawImage(img, 0, 0, pixelSize, pixelSize);
                console.log("الصورة رقم 1 نزلت بنجاح!");
            };
            
            img.onerror = () => {
                console.error("المتصفح مش لاقي صورة اسمها 1.png");
            };
        }

        drawGrid();
        // بنستنى نص ثانية عشان نضمن إن الصفحة حملت تمام
        setTimeout(loadImages, 500);
    </script>
</body>
</html>
