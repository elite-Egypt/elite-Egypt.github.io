<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080">
    <title>صفحة النخبة | Elite Page</title>
    <style>
        body { 
            margin: 0; 
            background: #000; 
            color: #DAA520; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            overflow-x: hidden; 
        }

        /* الهيدر الملكي - لغينا الـ sticky عشان القص */
        .header { 
            background: linear-gradient(145deg, #1a1a1a, #222); 
            padding: 15px; 
            border-bottom: 3px solid #DAA520; 
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        h1 { margin: 0; font-size: 1.8em; text-shadow: 2px 2px 4px #000; color: #DAA520; }
        
        .fb-contact {
            display: inline-flex; align-items: center; gap: 10px; background: #DAA520; color: #000;
            text-decoration: none; padding: 8px 20px; border-radius: 50px; font-weight: bold;
            font-size: 0.9em; margin-top: 10px; transition: 0.3s;
        }

        /* شريط الإعلانات العريض */
        .ticker-container {
            background: #000; border-bottom: 1px solid #333;
            overflow: hidden; white-space: nowrap; 
            padding: 25px 0; /* عرضناه عشان يكون واضح */
            width: 100%;
        }

        .ticker-text {
            display: inline-block; padding-left: 100%;
            animation: ticker 30s linear infinite;
            font-weight: bold; font-size: 1.4em; color: #DAA520;
        }

        @keyframes ticker {
            0% { transform: translateX(0); }
            100% { transform: translateX(100%); }
        }

        /* حاوية العرض - التصليح النهائي هنا */
        #viewport {
            width: 100vw;
            background: #111;
            display: block; /* لغينا الفليكس عشان ميرفعش الصورة لفوق */
            text-align: center;
        }

        #canvas-wrapper {
            position: relative;
            width: 1080px; 
            margin: 0 auto; /* توسيط الحاوية */
            height: 10000px; 
            background-color: #000;
            border-left: 1px solid #333;
            border-right: 1px solid #333;
        }

        #main-image {
            display: block;
            width: 1080px;
            height: 10000px;
            image-rendering: -webkit-optimize-contrast;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>صفحة النخبة</h1>
        <a href="https://www.facebook.com/profile.php?id=61587773337715" class="fb-contact" target="_blank">
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" width="18">
            تواصل معنا عبر فيسبوك
        </a>
    </div>

    <div class="ticker-container" id="ticker-box">
        <div class="ticker-text" id="ad-content">جارٍ تحميل إعلانات النخبة...</div>
    </div>

    <div id="viewport">
        <div id="canvas-wrapper">
            <img id="main-image" usemap="#pixelmap">
            <map name="pixelmap" id="map-links"></map>
        </div>
    </div>

    <script>
      window.onload = function() {
          var img = document.getElementById('main-image');
          img.src = 'all.webp?v=' + Date.now();

          // جلب الإعلانات من الملف الخارجي
          fetch('ads.json?v=' + Date.now())
              .then(res => res.json())
              .then(adsList => {
                  let activeAds = [];
                  const now = new Date().getTime();
                  adsList.forEach(ad => {
                      let expiry = new Date(ad.expiry).getTime();
                      if (now < expiry) activeAds.push(ad.text);
                  });
                  if (activeAds.length > 0) {
                      document.getElementById('ad-content').innerText = activeAds.join("  ||  ");
                  } else {
                      document.getElementById('ticker-box').style.display = 'none';
                  }
              }).catch(() => {
                  document.getElementById('ticker-box').style.display = 'none';
              });
      };

      var script = document.createElement('script');
      script.src = 'links.js?v=' + Date.now(); 
      document.head.appendChild(script);
    </script>
</body>
</html>
