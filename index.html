<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080">
    <title>صفحة النخبة | Elite Page</title>
    <style>
        body { margin: 0; padding: 0; background: #000; color: #DAA520; font-family: 'Segoe UI', Tahoma, sans-serif; overflow-x: hidden; }

        /* تجميع الهيدر والتيكر في حاوية واحدة ثابتة */
        .fixed-top {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: #000;
            width: 100%;
        }

        .header { 
            background: linear-gradient(145deg, #1a1a1a, #222); 
            padding: 15px 0; 
            border-bottom: 3px solid #DAA520; 
            text-align: center;
        }

        h1 { margin: 0; font-size: 1.8em; color: #DAA520; }
        
        .fb-contact {
            display: inline-flex; align-items: center; gap: 10px; background: #DAA520;
            color: #000; text-decoration: none; padding: 8px 20px; border-radius: 50px;
            font-weight: bold; font-size: 0.9em; margin-top: 10px;
        }

        /* شريط الأخبار - ارتفاع ثابت وواضح */
        .news-ticker {
            background: #000;
            border-bottom: 2px solid #DAA520;
            height: 50px; 
            overflow: hidden;
            display: flex;
            align-items: center;
        }

        .ticker-move {
            display: inline-block;
            white-space: nowrap;
            padding-right: 100%;
            animation: marquee 20s linear infinite; 
        }

        .ticker-item {
            display: inline-block;
            color: #DAA520;
            font-weight: bold;
            font-size: 1.3em;
            padding-left: 50px;
        }

        @keyframes marquee {
            0%   { transform: translateX(0); }
            100% { transform: translateX(100%); }
        }

        /* حاوية الصور */
        #viewport { width: 100vw; background: #111; display: flex; justify-content: center; padding-top: 10px; }
        #canvas-wrapper { position: relative; width: 1080px; background-color: #000; border: 1px solid #333; }
        #main-image { display: block; width: 1080px; height: auto; }
    </style>
</head>
<body>

    <div class="fixed-top">
        <div class="header">
            <h1>صفحة النخبة</h1>
            <a href="https://www.facebook.com/profile.php?id=61587773337715" class="fb-contact" target="_blank">
                <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" width="18">
                تواصل معنا عبر فيسبوك
            </a>
        </div>

        <div class="news-ticker">
            <div class="ticker-move">
                <div class="ticker-item" id="ticker-content">جاري تحميل أحدث الإعلانات...</div>
            </div>
        </div>
    </div>

    <div id="viewport">
        <div id="canvas-wrapper">
            <img id="main-image" usemap="#pixelmap">
            <map name="pixelmap" id="map-links"></map>
        </div>
    </div>

    <script>
      // دالة التحديث الإجباري لمنع الكاش
      const v = new Date().getTime();

      window.onload = function() {
          const img = document.getElementById('main-image');
          img.src = 'all.webp?v=' + v;
          
          // تحميل الروابط والإعلانات بنسخة جديدة
          function forceLoad(src) {
              const s = document.createElement('script');
              s.src = src + '?v=' + v;
              document.head.appendChild(s);
          }
          forceLoad('links.js');
          forceLoad('ads.js');
      };
    </script>

</body>
</html>
