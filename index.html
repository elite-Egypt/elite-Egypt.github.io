<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحة النخبة | Elite Page</title>
    <style>
        /* ستايل صفحة النخبة الملكي */
        body { 
            margin: 0; 
            background: #000; 
            color: #DAA520; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            overflow: hidden; 
        }

        .header { 
            background: linear-gradient(145deg, #1a1a1a, #222); 
            padding: 15px; 
            border-bottom: 3px solid #DAA520; 
            text-align: center;
            position: relative;
            z-index: 1000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        h1 { margin: 0; font-size: 1.8em; text-shadow: 2px 2px 4px #000; color: #DAA520; }
        
        /* زر التواصل بالفيسبوك */
        .fb-contact {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #DAA520;
            color: #000;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.9em;
            margin-top: 10px;
            transition: 0.3s;
        }
        .fb-contact:hover { background: #fff; transform: scale(1.05); }

        /* منطقة العرض (المساحة المليون بكسل) */
        #viewport {
            width: 100vw;
            height: calc(100vh - 120px);
            overflow: auto;
            background: #111;
            cursor: grab;
            -webkit-overflow-scrolling: touch;
        }

        #canvas-wrapper {
            position: relative;
            width: 1000px; /* العرض الثابت للمليون دولار */
            height: 1000px; /* الطول الثابت للمليون دولار */
            margin: 0 auto;
            border: 1px solid #333;
        }

        /* اللوحة اللي بتعرض صورة الـ all.png */
        #main-image {
            display: block;
            width: 1000px;
            height: 1000px;
            image-rendering: pixelated; /* سر الوضوح العالي جداً */
            background-image: 
                linear-gradient(to right, #222 1px, transparent 1px),
                linear-gradient(to bottom, #222 1px, transparent 1px);
            background-size: 10px 10px; /* شبكة المربعات الصغيرة */
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>صفحة النخبة</h1>
        <a href="https://www.facebook.com/profile.php?id=61587773337715" class="fb-contact" target="_blank">
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" width="18">
            تواصل معنا عبر فيسبوك
        </a>
    </div>

    <div id="viewport">
        <div id="canvas-wrapper">
            <img src="all.png" id="main-image" usemap="#pixelmap">
            
            <map name="pixelmap" id="map-links">
                </map>
        </div>
    </div>

</body>
</html>
