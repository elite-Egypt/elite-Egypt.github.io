<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080">
    <title>صفحة النخبة | Elite Page</title>
    <style>
        body { 
            margin: 0; 
            background: #000; 
            color: #DAA520; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            overflow-x: hidden; 
        }

        /* الهيدر */
        .header { 
            background: linear-gradient(145deg, #1a1a1a, #222); 
            padding: 15px; 
            border-bottom: 3px solid #DAA520; 
            text-align: center;
            position: sticky; 
            top: 0;
            z-index: 1000;
        }

        h1 { margin: 0; font-size: 1.8em; color: #DAA520; }
        
        .fb-contact {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #DAA520;
            color: #000;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.9em;
            margin-top: 10px;
        }

        /* --- شريط النخبة المظبوط: لا مقصوص ولا مقلوب --- */
        .news-ticker {
            background: #000;
            border-bottom: 2px solid #DAA520;
            height: 50px; /* زودنا الطول عشان الكلام ميبقاش مقصوص */
            overflow: hidden;
            position: sticky;
            top: 106px; /* ظبطنا مكانه تحت الهيدر بالظبط */
            z-index: 999;
            width: 100%;
            display: flex;
            align-items: center;
            direction: ltr; /* ده اللي بيخلي الحركة تبدأ يمين وتنتهي شمال صح */
        }

        .ticker-move {
            display: inline-block;
            white-space: nowrap;
            /* هيبدأ من أقصى اليمين (بره الشاشة) */
            padding-left: 100%; 
            animation: marquee-elite 25s linear infinite;
        }

        .ticker-item {
            display: inline-block;
            color: #DAA520;
            font-weight: bold;
            font-size: 1.3em;
            direction: rtl; /* نرجع العربي يتكرأ صح من اليمين للشمال */
            padding-right: 50px;
        }

        /* الحركة السليمة: من 0 لـ -100% يعني من اليمين للشمال */
        @keyframes marquee-elite {
            0%   { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        .news-ticker:hover .ticker-move { animation-play-state: paused; }

        /* حاوية العرض */
        #viewport {
            width: 100vw;
            background: #111;
            display: flex;
            justify-content: center;
            padding-top: 20px; 
        }

        #canvas-wrapper {
            position: relative;
            width: 1080px; 
            height: 10000px; 
            background-color: #000;
            border: 1px solid #333;
        }

        #main-image {
            display: block;
            width: 1080px;
            height: 10000px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>صفحة النخبة</h1>
        <a href="https://www.facebook.com/profile.php?id=61587773337715" class="fb-contact" target="_blank">
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" width="18">
            تواصل معنا عبر فيسبوك
        </a>
    </div>

    <div class="news-ticker">
        <div class="ticker-move">
            <div class="ticker-item" id="ticker-content">جاري جلب أحدث الإعلانات...</div>
        </div>
    </div>

    <div id="viewport">
        <div id="canvas-wrapper">
            <img id="main-image" usemap="#pixelmap">
            <map name="pixelmap" id="map-links"></map>
        </div>
    </div>

    <script>
      // تحديث الصورة
      window.onload = function() {
          var img = document.getElementById('main-image');
          img.src = 'all.webp?v=' + Date.now();
      };

      // تحميل الملفات الخارجية
      var scriptLinks = document.createElement('script');
      scriptLinks.src = 'links.js?v=' + Date.now();
      document.head.appendChild(scriptLinks);

      var scriptAds = document.createElement('script');
      scriptAds.src = 'ads.js?v=' + Date.now();
      document.head.appendChild(scriptAds);
    </script>

</body>
</html>
