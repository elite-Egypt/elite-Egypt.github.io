<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080">
    <title>صفحة النخبة | Elite Page</title>
    <style>
        body { 
            margin: 0; 
            background: #000; 
            color: #DAA520; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            overflow-x: hidden; 
        }

        /* الهيدر الملكي */
        .header { 
            background: linear-gradient(145deg, #1a1a1a, #222); 
            padding: 15px; 
            border-bottom: 3px solid #DAA520; 
            text-align: center;
            position: sticky; 
            top: 0;
            z-index: 1000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        h1 { margin: 0; font-size: 1.8em; text-shadow: 2px 2px 4px #000; color: #DAA520; }
        
        .fb-contact {
            display: inline-flex;
            align-items: center; gap: 10px;
            background: #DAA520; color: #000;
            text-decoration: none; padding: 8px 20px;
            border-radius: 50px; font-weight: bold;
            font-size: 0.9em; margin-top: 10px;
        }

        /* --- شريط الإعلانات: الإصدار الفولاذي --- */
        .news-ticker {
            background: #000;
            border-bottom: 2px solid #DAA520;
            height: 45px;
            overflow: hidden;
            position: sticky;
            top: 103px; 
            z-index: 999;
            display: flex;
            align-items: center;
            direction: ltr !important; /* إجبار الاتجاه تقنياً لمنع العك */
        }

        .ticker-wrapper {
            display: inline-block;
            white-space: nowrap;
            /* يبدأ من اليمين (خارج الشاشة) */
            transform: translateX(1080px); 
            animation: marquee 25s linear infinite;
            color: #DAA520;
            font-weight: bold;
            font-size: 1.2em;
            direction: rtl !important; /* النص نفسه يفضل عربي */
        }

        /* حركة دقيقة: من أقصى اليمين لأقصى الشمال */
        @keyframes marquee {
            0% { transform: translateX(1080px); }
            100% { transform: translateX(-100%); }
        }

        #viewport {
            width: 100vw;
            background: #111;
            display: flex;
            justify-content: center;
            overflow-y: auto;
            padding-top: 20px;
        }

        #canvas-wrapper {
            position: relative;
            width: 1080px; 
            height: 10000px; 
            background-color: #000;
            border-left: 1px solid #333;
            border-right: 1px solid #333;
        }

        #main-image {
            display: block;
            width: 1080px;
            height: 10000px;
            image-rendering: -webkit-optimize-contrast; 
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>صفحة النخبة</h1>
        <a href="https://www.facebook.com/profile.php?id=61587773337715" class="fb-contact" target="_blank">
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" width="18">
            تواصل معنا عبر فيسبوك
        </a>
    </div>

    <div class="news-ticker">
        <div class="ticker-wrapper" id="ticker-content">جاري التحميل...</div>
    </div>

    <div id="viewport">
        <div id="canvas-wrapper">
            <img id="main-image" usemap="#pixelmap">
            <map name="pixelmap" id="map-links"></map>
        </div>
    </div>

    <script>
      window.onload = function() {
          const t = Date.now();
          document.getElementById('main-image').src = 'all.webp?v=' + t;

          const sL = document.createElement('script');
          sL.src = 'links.js?v=' + t;
          document.head.appendChild(sL);

          const sA = document.createElement('script');
          sA.src = 'ads.js?v=' + t;
          document.head.appendChild(sA);
      };
    </script>
</body>
</html>
